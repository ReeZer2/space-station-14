- type: entity
  parent:
  - AppearanceTajaran
  - BaseSpeciesMobOrganic
  id: MobTajaran
  name: Urist McTajaran
  components:
  - type: DamageOnHighSpeedImpact
    damage:
      types:
        Blunt: 0.9
    soundHit:
      path: /Audio/Effects/hit_kick.ogg
  - type: TypingIndicator
    proto: tajaran
  - type: DamageVisuals
    damageOverlayGroups:
      Brute:
        sprite: Mobs/Effects/brute_damage.rsi
        color: "#ccac1f"
      Burn:
        sprite: Mobs/Effects/burn_damage.rsi
  - type: MessyDrinker
    spillChance: 0.33
  - type: Speech
    speechSounds: Alto
    speechVerb: Tajaran
    allowedEmotes: ['Growl','Purr','Hiss','Meow','Mrow']
  - type: Vocal
    sounds:
      Male: MaleTajaran
      Female: FemaleTajaran
      Unsexed: MaleTajaran
  - type: Damageable
    damageModifierSet: Tajaran
  - type: MeleeWeapon
    soundHit:
      collection: AlienClaw
    angle: 30
    animation: WeaponArcClaw
    damage:
      types:
        Slash: 5
  - type: Temperature
    heatDamageThreshold: 320
    coldDamageThreshold: 230
    currentTemperature: 310.15
    specificHeat: 42
    coldDamage:
      types:
        Cold: 0.05 #per second, scales with temperature & other constants
    heatDamage:
      types:
        Heat: 2 #per second, scales with temperature & other constants
  - type: TemperatureDamage
    heatDamageThreshold: 320
    coldDamageThreshold: 230
    coldDamage:
      types:
        Cold: 0.05
    heatDamage:
      types:
        Heat: 2.5
  - type: TemperatureProtection
    heatingCoefficient: 1.2
    coolingCoefficient: 0.3
  - type: Bloodstream
    bloodReferenceSolution:
      reagents:
      - ReagentId: SulfurBlood
        Quantity: 300
  - type: TajaranAccent
  - type: Wagging
    action: ActionToggleWaggingTajaran
  - type: TemperatureSpeed
    thresholds:
      289: 0.8
      275: 0.6
      250: 0.4
  - type: KeenHearing
    visionRadius: 5
    highSensitiveVisionRadius: 2
    addAction: true
  - type: Language
    selectedLanguage: Galactic
    availableLanguages:
    - id: Galactic
    - id: Siiktajr
  - type: LimitationRevive
    reviveLimit: 3
  - type: Perishable
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: FoodMeat
      amount: 5
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 185
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer

